name: Fitfluence
options:
  deploymentTarget:
    iOS: '17.0'
  createIntermediateGroups: true
packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.10.0
  AppAuth:
    url: https://github.com/openid/AppAuth-iOS
    from: 1.7.6
configs:
  Dev: debug
  Stage: release
  Prod: release
targets:
  FitfluenceApp:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - App
    configFiles:
      Dev: Configs/Dev.xcconfig
      Stage: Configs/Stage.xcconfig
      Prod: Configs/Prod.xcconfig
    info:
      path: App/Info.plist
      properties:
        AppEnvironmentName: $(APP_ENVIRONMENT_NAME)
        BaseURL: $(BASE_URL)
        KeycloakURL: $(KEYCLOAK_URL)
        KeycloakRealm: $(KEYCLOAK_REALM)
        KeycloakClientId: $(KEYCLOAK_CLIENT_ID)
        KeycloakRedirectURI: $(KEYCLOAK_REDIRECT_URI)
        KeycloakScopes: $(KEYCLOAK_SCOPES)
        KeycloakRegistrationHintMode: $(KEYCLOAK_REGISTRATION_HINT_MODE)
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
            176.108.251.89:
              NSExceptionAllowsInsecureHTTPLoads: true
        NSLocalNetworkUsageDescription: Приложению нужен доступ к локальной сети для подключения к вашему dev-серверу.
        NSBonjourServices:
          - _http._tcp
          - _https._tcp
        CFBundleURLTypes:
          - CFBundleURLName: fitfluence.oauth
            CFBundleURLSchemes:
              - fitfluence
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitfluence.ios
        PRODUCT_NAME: FitfluenceApp
        SWIFT_VERSION: 5.10
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        TARGETED_DEVICE_FAMILY: 1,2
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: ComposableArchitecture
        product: ComposableArchitecture
      - package: AppAuth
        product: AppAuth
  FitfluenceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    hostApplication: FitfluenceApp
    sources:
      - Tests
    configFiles:
      Dev: Configs/Dev.xcconfig
      Stage: Configs/Stage.xcconfig
      Prod: Configs/Prod.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitfluence.ios.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FitfluenceApp
schemes:
  FitfluenceApp:
    build:
      targets:
        FitfluenceApp: all
        FitfluenceTests: [test]
    test:
      targets:
        - FitfluenceTests
