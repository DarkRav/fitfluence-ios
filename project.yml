name: Fitfluence
options:
  deploymentTarget:
    iOS: '17.0'
  createIntermediateGroups: true
packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.10.0
configs:
  Dev: debug
  Stage: release
  Prod: release
targets:
  FitfluenceApp:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - App
    configFiles:
      Dev: Configs/Dev.xcconfig
      Stage: Configs/Stage.xcconfig
      Prod: Configs/Prod.xcconfig
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitfluence.ios
        PRODUCT_NAME: FitfluenceApp
        SWIFT_VERSION: 5.10
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        TARGETED_DEVICE_FAMILY: 1,2
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: ComposableArchitecture
        product: ComposableArchitecture
  FitfluenceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    hostApplication: FitfluenceApp
    sources:
      - Tests
    configFiles:
      Dev: Configs/Dev.xcconfig
      Stage: Configs/Stage.xcconfig
      Prod: Configs/Prod.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitfluence.ios.tests
    dependencies:
      - target: FitfluenceApp
schemes:
  FitfluenceApp:
    build:
      targets:
        FitfluenceApp: all
        FitfluenceTests: [test]
    test:
      targets:
        - FitfluenceTests
